name: Patch HLA participant sender

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-hla-participant-sender.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch Apps Script sender and approval flow
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          import re

          code_path = Path('access-system/Code.gs')
          code = code_path.read_text(encoding='utf-8')

          if 'PARTICIPANT_FROM_EMAIL' not in code:
              code = code.replace(
                  "  OWNER_EMAIL: 'ryandermody@gmail.com',\n",
                  "  OWNER_EMAIL: 'ryandermody@gmail.com',\n  PARTICIPANT_FROM_EMAIL: 'info@harbourlineadvisory.com',\n",
                  1,
              )

          old_approval = """    sheet.getRange(rowNumber, COL.STATUS).setValue('APPROVED');
    sheet.getRange(rowNumber, COL.APPROVED_AT).setValue(new Date());
    sheet.getRange(rowNumber, COL.DECISION_NOTE).setValue('Approved; code emailed automatically');
    consumeApprovalTokens_(requestId);
    if (referralId) setReferralStatus_(referralId, 'APPROVED');

    sendVisitorCode_(email, name, code, referralId);"""
          new_approval = """    // Send first. If Google does not recognize the Harbour Line sender,
    // the request remains pending and the YES link can be used again after fixing the alias.
    sendVisitorCode_(email, name, code, referralId);

    sheet.getRange(rowNumber, COL.STATUS).setValue('APPROVED');
    sheet.getRange(rowNumber, COL.APPROVED_AT).setValue(new Date());
    sheet.getRange(rowNumber, COL.DECISION_NOTE).setValue('Approved; code emailed automatically from Harbour Line');
    consumeApprovalTokens_(requestId);
    if (referralId) setReferralStatus_(referralId, 'APPROVED');"""
          if old_approval in code:
              code = code.replace(old_approval, new_approval, 1)

          replacement = r'''function participantSenderOptions_() {
  const desired = normalizeEmail_(CONFIG.PARTICIPANT_FROM_EMAIL);
  const effectiveUser = normalizeEmail_(Session.getEffectiveUser().getEmail());
  const aliases = GmailApp.getAliases().map((address) => normalizeEmail_(address));
  const options = {
    name: 'Harbour Line Advisory',
    replyTo: desired,
  };

  if (aliases.includes(desired)) {
    options.from = desired;
    return options;
  }

  // When the Apps Script itself is owned and executed by the info account,
  // Gmail naturally sends from that primary address and no from option is needed.
  if (effectiveUser === desired) return options;

  throw new Error(
    'Google has not authorized ' + desired +
    ' as a sending address for this Apps Script account. Add it in Gmail under Accounts and Import > Send mail as, then run testParticipantSender.'
  );
}

function testParticipantSender() {
  const options = participantSenderOptions_();
  const body = [
    'Harbour Line sender test successful.',
    '',
    'Participant approval emails are configured to send from ' + CONFIG.PARTICIPANT_FROM_EMAIL + '.',
  ].join('\n');

  GmailApp.sendEmail(
    CONFIG.OWNER_EMAIL,
    'Harbour Line sender test',
    body,
    options
  );

  return 'Test email sent to ' + CONFIG.OWNER_EMAIL + ' from ' + CONFIG.PARTICIPANT_FROM_EMAIL + '.';
}

function sendVisitorCode_(email, name, code, referralId) {
  const greeting = name ? 'Hello ' + name + ',' : 'Hello,';
  let portalUrl = ScriptApp.getService().getUrl() + '?tab=code';
  if (referralId) portalUrl += '&r=' + encodeURIComponent(referralId);

  const body = [
    greeting,
    '',
    'Your request to take part in the Harbour Line Operating Reality Study has been approved.',
    '',
    'Use the same email address you submitted and this private access code:',
    code,
    '',
    'Open the private access page:',
    portalUrl,
    '',
    'The code expires after seven days and allows up to three successful entries.',
    '',
    'Harbour Line Advisory',
  ].join('\n');

  const htmlBody = `
    <div style="font-family:Arial,sans-serif;color:#1b2733;line-height:1.6;max-width:620px">
      <p style="color:#0e6a6a;text-transform:uppercase;letter-spacing:.12em;font-size:12px;font-weight:bold">Harbour Line Advisory</p>
      <h2 style="font-family:Georgia,serif;font-weight:400">Your private access has been approved</h2>
      <p>${escapeHtml_(greeting)}</p>
      <p>Your request to take part in the Harbour Line Operating Reality Study has been approved.</p>
      <p>Use the same email address you submitted and this private access code:</p>
      <div style="font-family:monospace;font-size:20px;letter-spacing:.04em;background:#f2f5f7;padding:16px;margin:20px 0"><strong>${escapeHtml_(code)}</strong></div>
      <p><a href="${portalUrl}" style="display:inline-block;background:#0e6a6a;color:#fff;text-decoration:none;padding:13px 18px;font-weight:bold">Open private access</a></p>
      <p style="font-size:12px;color:#52616f">The code expires after seven days and allows up to three successful entries.</p>
    </div>`;

  const options = participantSenderOptions_();
  options.htmlBody = htmlBody;

  GmailApp.sendEmail(
    email,
    'Your Harbour Line private access code',
    body,
    options
  );
}

function adminUrl_'''

          pattern = re.compile(
              r"function sendVisitorCode_\(email, name, code, referralId\) \{.*?\n\}\n\nfunction adminUrl_",
              re.S,
          )
          code, count = pattern.subn(replacement, code, count=1)
          if count != 1 and 'function participantSenderOptions_()' not in code:
              raise SystemExit('Could not replace sendVisitorCode_ safely')

          code = code.replace(
              "Approved participants receive a private code by email.",
              "If approved, Harbour Line automatically emails your private access code and link.",
          )
          code_path.write_text(code, encoding='utf-8')

          manifest_path = Path('access-system/appsscript.json')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          scopes = manifest.setdefault('oauthScopes', [])
          gmail_scope = 'https://mail.google.com/'
          if gmail_scope not in scopes:
              scopes.append(gmail_scope)
          manifest_path.write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')

          readme_path = Path('access-system/README.md')
          readme = readme_path.read_text(encoding='utf-8') if readme_path.exists() else ''
          marker = '## Participant sender: info@harbourlineadvisory.com'
          if marker not in readme:
              readme += '''

## Participant sender: info@harbourlineadvisory.com

Approved participants are emailed automatically from `info@harbourlineadvisory.com`.
The Apps Script account must either be the `info@` account or have `info@harbourlineadvisory.com`
configured and verified in Gmail under **Settings > Accounts and Import > Send mail as**.

After copying the source into Apps Script, run `testParticipantSender` once. Google will request
the additional Gmail authorization and send a test message to `ryandermody@gmail.com`. Do not
open invitations until that test arrives showing the Harbour Line address as the sender.
'''
              readme_path.write_text(readme, encoding='utf-8')
          PY

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          cp access-system/Code.gs /tmp/Code.js
          node --check /tmp/Code.js
          python3 -m json.tool access-system/appsscript.json >/dev/null

      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add access-system/Code.gs access-system/appsscript.json access-system/README.md
          git commit -m 'Send approved access codes from Harbour Line email'
          git push origin main
